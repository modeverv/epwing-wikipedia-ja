services:
  toolchain:
    build:
      context: .
      dockerfile: docker/toolchain.Dockerfile
    image: wikiepwing-toolchain:1.0.0
    profiles: ["build"]

  builder:
    build:
      context: .
      dockerfile: docker/builder.Dockerfile
    image: wikiepwing-builder:0.1.0
    user: "10001:10001"
    working_dir: /workspace
    environment:
      WIKIEPWING_CONFIG_DIR: /workspace/config
      WIKIEPWING_DATA_DIR: /data
      WIKIEPWING_OUTPUT_DIR: /output
      WIKIEPWING_REPORTS_DIR: /reports
      RUFF_CACHE_DIR: /data/ruff-cache
    volumes:
      - .:/workspace:ro
      - wikiepwing-data:/data
      - ./output:/output
      - ./reports:/reports
    command: ["wikiepwing", "doctor"]

volumes:
  wikiepwing-data:
    name: wikiepwing-data
