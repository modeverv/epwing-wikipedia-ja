services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    image: wikiepwing-app:dev
    user: "10001:10001"
    working_dir: /app
    read_only: true
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      WIKIEPWING_CONTAINER: "1"
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=10001,gid=10001,mode=1777
    volumes:
      - type: volume
        source: sources
        target: /data/sources
      - type: volume
        source: work
        target: /data/work
      - type: volume
        source: cache
        target: /data/cache
      - type: bind
        source: ./output
        target: /data/output
      - type: bind
        source: ./reports
        target: /data/reports
      - type: bind
        source: ./reports/logs
        target: /data/logs

volumes:
  sources:
  work:
  cache:
