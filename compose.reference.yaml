services:
  app:
    volumes:
      - type: bind
        source: ${WIKIEPWING_REFERENCE_PATH:?set WIKIEPWING_REFERENCE_PATH to the Boookends EPWING directory}
        target: /data/reference
        read_only: true
        bind:
          create_host_path: false
  reference-inspector:
    build:
      context: .
      dockerfile: docker/toolchain.Dockerfile
    image: wikiepwing-toolchain:dev
    user: "10001:10001"
    working_dir: /app
    read_only: true
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      WIKIEPWING_CONTAINER: "1"
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=10001,gid=10001,mode=1777
    volumes:
      - type: bind
        source: ${WIKIEPWING_REFERENCE_PATH:?set WIKIEPWING_REFERENCE_PATH to the Boookends EPWING directory}
        target: /data/reference
        read_only: true
        bind:
          create_host_path: false
      - type: volume
        source: work
        target: /data/work
      - type: bind
        source: ./reports
        target: /data/reports
